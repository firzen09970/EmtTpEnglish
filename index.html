<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EMT TP 常用藥物字彙</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#c0392b;--primary-dark:#962d22;--primary-light:#e74c3c;
  --bg:#f0f2f5;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;
  --shadow:0 4px 20px rgba(0,0,0,.08);--radius:16px;
  --success:#27ae60;--warning:#f39c12;--danger:#d63031;
}

body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100dvh; 
  display:flex; flex-direction:column; overflow:hidden;
}

.header{background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#fff;padding:12px 20px 10px;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.header::before{content:'';position:absolute;inset:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(231,76,60,.12),transparent 50%);}
.header *{position:relative;}
.header .icon{font-size:1.6rem;margin-bottom:4px;}
.header h1{font-size:1.2rem;font-weight:700;}
.header .sub{font-size:.75rem;opacity:.6;margin-top:2px;}

.tabs{display:flex;justify-content:center;gap:6px;padding:8px 10px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;flex-wrap:wrap;flex-shrink:0;}
.tab-btn{padding:8px 18px;border:none;background:0;font-family:inherit;font-size:.9rem;font-weight:500;color:var(--text-light);cursor:pointer;border-radius:25px;transition:.25s;}
.tab-btn:hover{background:#f0f0f0;color:var(--text);}
.tab-btn.active{background:var(--primary);color:#fff;}

.controls{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 10px;flex-wrap:wrap;flex-shrink:0;}
.ctl-select,.ctl-btn{padding:6px 14px;border:2px solid #e0e0e0;border-radius:25px;font-family:inherit;font-size:.82rem;background:#fff;color:var(--text);cursor:pointer;outline:none;transition:.25s;}
.ctl-select:focus{border-color:var(--primary);}
.ctl-btn.on{border-color:var(--warning);background:#fff8e1;color:#e67e22;}

.container{max-width:680px;margin:0 auto;padding:0 12px 12px;flex:1;display:flex;flex-direction:column;width:100%;overflow-y:auto;}
.panel{display:none;}
.panel.active{display:flex;flex-direction:column;flex:1;}

/* Flashcard */
.fc-area{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding-top:5px;}
.fc-counter{font-size:.82rem;color:var(--text-light);margin-bottom:6px;}
.progress-track{width:100%;max-width:480px;height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:12px;overflow:hidden;flex-shrink:0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#e74c3c);border-radius:2px;transition:width .4s;}

.fc-wrap{perspective:1200px;width:100%;max-width:480px;flex:1;min-height:200px;max-height:40vh;margin-bottom:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:var(--shadow);}
.fc-front{background:#fff;}
.fc-back{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;transform:rotateY(180deg);}
.fc-cat{font-size:.72rem;padding:3px 12px;border-radius:20px;background:rgba(0,0,0,.06);color:var(--text-light);margin-bottom:14px;}
.fc-word{font-size:1.8rem;font-weight:700;text-align:center;line-height:1.35;word-break: break-word;}
.fc-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px;}
.act-btn{width:38px;height:38px;border:none;background:rgba(0,0,0,.05);border-radius:50%;cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.act-btn.fav{color:#f39c12;}

.fc-nav{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.nav-btn{padding:11px 26px;border:none;background:#fff;font-family:inherit;font-size:.88rem;font-weight:500;color:var(--text);cursor:pointer;border-radius:25px;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:.2s;}
.nav-btn.flip{background:var(--primary);color:#fff;}

/* Overview */
.search-box{width:100%;padding:11px 20px;border:2px solid #e0e0e0;border-radius:25px;font-family:inherit;font-size:.92rem;outline:none;transition:.25s;margin:10px 0 14px;}
.vocab-row{display:flex;flex-direction:column;padding:12px 14px;background:#fff;border-radius:12px;margin-bottom:5px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:.2s;}
.vocab-row-top{display:flex;align-items:center;width:100%;}
.vocab-row .eng{font-weight:600;font-size:.92rem;flex:1;}
.vocab-row .chi{font-size:.88rem;color:var(--text-light);margin-left:10px;flex:1;}
.vocab-row .row-acts{display:flex;gap:2px;margin-left:10px;}
.vocab-row .row-acts button{width:32px;height:32px;border:none;background:0;cursor:pointer;border-radius:50%;font-size:.88rem;transition:.2s;}
.vocab-row .row-acts button.del{color:var(--danger);}
.vocab-note{font-size:.78rem;color:#6c7a89;background:#f8f9fa;border-left:3px solid var(--primary);padding:6px 10px;border-radius:0 6px 6px 0;margin-top:8px;line-height:1.5;}
.fc-note{font-size:.78rem;opacity:.85;margin-top:10px;text-align:center;line-height:1.5;padding:0 4px;}

/* Manage */
.manage-section{background:#fff;padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);margin-top:16px;}
.manage-title{font-size:1.05rem;font-weight:700;color:var(--primary);margin-bottom:16px;border-bottom:2px solid #f0f2f5;padding-bottom:8px;}
.form-group{margin-bottom:12px;}
.form-input{width:100%;padding:11px 16px;border:2px solid #e0e0e0;border-radius:12px;font-family:inherit;font-size:.92rem;outline:none;}
.form-btn{padding:10px 20px;border:none;background:var(--primary);color:#fff;font-family:inherit;font-size:.9rem;font-weight:500;border-radius:12px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.form-btn.sec{background:#e0e0e0;color:var(--text);}
.form-btn.danger{background:var(--danger);}
.json-area{width:100%;height:100px;padding:12px;border:2px solid #e0e0e0;border-radius:12px;font-family:monospace;font-size:.85rem;resize:vertical;margin-bottom:12px;}

/* ===== QUIZ STYLES ===== */
.quiz-start{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;gap:16px;}
.quiz-start-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:30px;width:100%;max-width:480px;text-align:center;}
.quiz-start-card h2{font-size:1.3rem;font-weight:700;margin-bottom:8px;color:var(--primary);}
.quiz-start-card p{font-size:.9rem;color:var(--text-light);margin-bottom:20px;}
.quiz-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.quiz-mode-btn{padding:14px 10px;border:2px solid #e0e0e0;border-radius:12px;background:#fff;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;color:var(--text);}
.quiz-mode-btn:hover,.quiz-mode-btn.selected{border-color:var(--primary);background:#fff5f5;color:var(--primary);}
.quiz-start-btn{width:100%;padding:14px;border:none;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-family:inherit;font-size:1rem;font-weight:700;border-radius:12px;cursor:pointer;transition:.2s;}
.quiz-start-btn:hover{opacity:.9;transform:translateY(-1px);}

.quiz-area{display:flex;flex-direction:column;flex:1;padding-top:8px;}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0;}
.quiz-info{font-size:.82rem;color:var(--text-light);}
.quiz-score-badge{background:var(--primary);color:#fff;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;}
.quiz-progress-track{width:100%;height:5px;background:#e0e0e0;border-radius:3px;margin-bottom:14px;overflow:hidden;flex-shrink:0;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--success),#2ecc71);border-radius:3px;transition:width .4s;}

.quiz-question-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:14px;flex-shrink:0;}
.quiz-qtype{font-size:.72rem;color:var(--text-light);margin-bottom:8px;}
.quiz-question{font-size:1.15rem;font-weight:700;line-height:1.5;color:var(--text);}
.quiz-question .highlight{color:var(--primary);}

.quiz-options{display:flex;flex-direction:column;gap:9px;flex-shrink:0;}
.quiz-opt{padding:13px 18px;border:2px solid #e8e8e8;border-radius:12px;background:#fff;font-family:inherit;font-size:.9rem;font-weight:500;cursor:pointer;transition:.2s;text-align:left;color:var(--text);line-height:1.4;}
.quiz-opt:hover:not(:disabled){border-color:var(--primary);background:#fff5f5;}
.quiz-opt.correct{border-color:var(--success)!important;background:#eafaf1!important;color:var(--success)!important;}
.quiz-opt.wrong{border-color:var(--danger)!important;background:#fff0f0!important;color:var(--danger)!important;}
.quiz-opt.reveal{border-color:#aaa!important;background:#f5f5f5!important;color:#888!important;}
.quiz-opt:disabled{cursor:default;}

.quiz-feedback{margin-top:12px;padding:12px 16px;border-radius:12px;font-size:.88rem;font-weight:600;text-align:center;display:none;}
.quiz-feedback.show{display:block;}
.quiz-feedback.ok{background:#eafaf1;color:var(--success);}
.quiz-feedback.bad{background:#fff0f0;color:var(--danger);}

.quiz-next-btn{margin-top:12px;width:100%;padding:13px;border:none;background:var(--primary);color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;border-radius:12px;cursor:pointer;display:none;}
.quiz-next-btn.show{display:block;}

/* Result */
.quiz-result{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;}
.result-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:30px;width:100%;max-width:480px;text-align:center;}
.result-emoji{font-size:3rem;margin-bottom:12px;}
.result-score{font-size:2.5rem;font-weight:900;color:var(--primary);margin-bottom:4px;}
.result-sub{font-size:.9rem;color:var(--text-light);margin-bottom:20px;}
.result-bar{width:100%;height:12px;background:#f0f0f0;border-radius:6px;overflow:hidden;margin-bottom:20px;}
.result-bar-fill{height:100%;border-radius:6px;transition:width 1s ease;}
.result-detail{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.result-stat{background:#f8f8f8;border-radius:10px;padding:12px;text-align:center;}
.result-stat .val{font-size:1.3rem;font-weight:700;}
.result-stat .lbl{font-size:.75rem;color:var(--text-light);}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.result-btn{padding:11px 22px;border:none;border-radius:12px;font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;}
.result-btn.primary{background:var(--primary);color:#fff;}
.result-btn.sec{background:#e0e0e0;color:var(--text);}

/* Wrong review */
.wrong-list{margin-top:16px;text-align:left;}
.wrong-list h3{font-size:.9rem;font-weight:700;color:var(--danger);margin-bottom:10px;}
.wrong-item{background:#fff5f5;border-radius:10px;padding:10px 14px;margin-bottom:7px;font-size:.85rem;}
.wrong-item .wi-en{font-weight:700;color:var(--primary);}
.wrong-item .wi-zh{color:var(--text-light);}
.wrong-item .wi-note{font-size:.78rem;color:var(--text-light);margin-top:3px;}

@media(max-width:480px){
  .header h1{font-size:1.05rem;}
  .tab-btn{padding:6px 10px;font-size:.8rem;}
  .form-btn{width:100%;margin-bottom:8px;}
  .fc-word{font-size:1.5rem;}
  .quiz-mode-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div class="icon">🚑</div>
  <h1>EMT TP 常用英文字彙</h1>
  <div class="sub">藥物與救護輸液</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('flash',this)">📇 閃卡</button>
  <button class="tab-btn" onclick="switchTab('overview',this)">📖 總覽</button>
  <button class="tab-btn" onclick="switchTab('quiz',this)">📝 測驗</button>
  <button class="tab-btn" onclick="switchTab('manage',this)">⚙️ 管理</button>
</div>

<div class="controls" id="mainControls">
  <select class="ctl-select" id="catSelect" onchange="onFilterChange()">
    <option value="全部">分類：全部</option>
  </select>
  <button class="ctl-btn" id="favBtn" onclick="toggleFavOnly()">⭐ 只顯示最愛</button>
  <button class="ctl-btn" id="shuffleBtn" onclick="shuffleCards()">🔀 隨機排序</button>
</div>

<div class="container">

  <!-- FLASH -->
  <div class="panel active" id="panel-flash">
    <div class="fc-area">
      <div class="fc-counter" id="fcCounter">0 / 0</div>
      <div class="progress-track"><div class="progress-fill" id="fcProgress" style="width:0%"></div></div>
      <div class="fc-wrap" id="fcWrap" onclick="flipCard()">
        <div class="fc-inner" id="fcInner">
          <div class="fc-face fc-front" id="fcFront">
            <div class="fc-actions">
              <button class="act-btn" onclick="event.stopPropagation();speakWord()">🔊</button>
              <button class="act-btn" id="favBtnF" onclick="event.stopPropagation();toggleFav()">☆</button>
            </div>
            <div class="fc-cat" id="fcCatF"></div>
            <div class="fc-word" id="fcEng"></div>
            <div class="fc-hint">點擊翻面</div>
          </div>
          <div class="fc-face fc-back" id="fcBack">
            <div class="fc-actions">
              <button class="act-btn" onclick="event.stopPropagation();speakWord()">🔊</button>
              <button class="act-btn" id="favBtnB" onclick="event.stopPropagation();toggleFav()">☆</button>
            </div>
            <div class="fc-cat" id="fcCatB"></div>
            <div class="fc-word" id="fcZh"></div>
            <div class="fc-note" id="fcNote"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevCard()">←</button>
        <button class="nav-btn flip" onclick="flipCard()">翻面</button>
        <button class="nav-btn" id="nextBtn" onclick="nextCard()">→</button>
      </div>
    </div>
  </div>

  <!-- OVERVIEW -->
  <div class="panel" id="panel-overview">
    <input class="search-box" id="searchBox" placeholder="🔍 搜尋單字或藥名…" oninput="renderOverview()">
    <div id="ovList"></div>
  </div>

  <!-- QUIZ -->
  <div class="panel" id="panel-quiz">
    <!-- Start Screen -->
    <div id="quizStart" class="quiz-start">
      <div class="quiz-start-card">
        <h2>📝 模擬測驗</h2>
        <p>從藥物庫中隨機抽取 50 題，測試你的臨床藥物知識</p>
        <div style="font-size:.85rem;color:var(--text-light);margin-bottom:16px;">目前藥物庫共 <strong id="quizPoolCount">0</strong> 種藥物</div>
        <div style="text-align:left;font-size:.85rem;font-weight:600;margin-bottom:10px;color:var(--text);">選擇題型：</div>
        <div class="quiz-mode-grid">
          <button class="quiz-mode-btn selected" id="modeBtn1" onclick="selectMode('en2zh')">🇬🇧 → 🇹🇼<br>英文選中文</button>
          <button class="quiz-mode-btn" id="modeBtn2" onclick="selectMode('zh2en')">🇹🇼 → 🇬🇧<br>中文選英文</button>
          <button class="quiz-mode-btn" id="modeBtn3" onclick="selectMode('cat2drug')">分類選藥物<br>🏷️ → 💊</button>
          <button class="quiz-mode-btn" id="modeBtn4" onclick="selectMode('mixed')">🎲 混合模式<br>(三種皆有)</button>
        </div>
        <div style="text-align:left;font-size:.85rem;font-weight:600;margin-bottom:10px;color:var(--text);">題數：</div>
        <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
          <button class="quiz-mode-btn" id="cntBtn10" onclick="selectCount(10)" style="flex:1;padding:10px 6px;">10 題</button>
          <button class="quiz-mode-btn selected" id="cntBtn50" onclick="selectCount(50)" style="flex:1;padding:10px 6px;">50 題</button>
          <button class="quiz-mode-btn" id="cntBtn20" onclick="selectCount(20)" style="flex:1;padding:10px 6px;">20 題</button>
        </div>
        <button class="quiz-start-btn" onclick="startQuiz()">🚀 開始測驗</button>
      </div>
    </div>

    <!-- Quiz Area -->
    <div id="quizArea" class="quiz-area" style="display:none;">
      <div class="quiz-header">
        <span class="quiz-info" id="quizCounter">第 1 / 50 題</span>
        <span class="quiz-score-badge" id="quizScoreBadge">✅ 0 分</span>
      </div>
      <div class="quiz-progress-track"><div class="quiz-progress-fill" id="quizProgress" style="width:0%"></div></div>
      <div class="quiz-question-card">
        <div class="quiz-qtype" id="quizQtype"></div>
        <div class="quiz-question" id="quizQuestion"></div>
      </div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="quiz-next-btn" id="quizNextBtn" onclick="nextQuestion()">下一題 →</button>
    </div>

    <!-- Result -->
    <div id="quizResult" class="quiz-result" style="display:none;">
      <div class="result-card">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <div class="result-score" id="resultScore">0 分</div>
        <div class="result-sub" id="resultSub"></div>
        <div class="result-bar"><div class="result-bar-fill" id="resultBarFill" style="width:0%"></div></div>
        <div class="result-detail">
          <div class="result-stat"><div class="val" id="resCorrect" style="color:var(--success)">0</div><div class="lbl">✅ 答對</div></div>
          <div class="result-stat"><div class="val" id="resWrong" style="color:var(--danger)">0</div><div class="lbl">❌ 答錯</div></div>
          <div class="result-stat"><div class="val" id="resTotal">0</div><div class="lbl">📋 總題數</div></div>
          <div class="result-stat"><div class="val" id="resPct" style="color:var(--primary)">0%</div><div class="lbl">🎯 正確率</div></div>
        </div>
        <div class="result-actions">
          <button class="result-btn primary" onclick="restartQuiz()">🔁 再測一次</button>
          <button class="result-btn sec" onclick="backToStart()">🏠 回選單</button>
        </div>
        <div class="wrong-list" id="wrongList"></div>
      </div>
    </div>
  </div>

  <!-- MANAGE -->
  <div class="panel" id="panel-manage">
    <div class="manage-section">
      <div class="manage-title">➕ 新增單字</div>
      <input type="text" id="newEn" class="form-input" placeholder="英文藥名 (例: Aspirin)" style="margin-bottom:8px;">
      <input type="text" id="newZh" class="form-input" placeholder="中文/商品名 (例: 阿斯匹靈)" style="margin-bottom:8px;">
      <input type="text" id="newCat" class="form-input" placeholder="分類 (預設: 自訂分類)" style="margin-bottom:8px;">
      <button class="form-btn" onclick="addSingleWord()">加入單字庫</button>
    </div>

    <div class="manage-section">
      <div class="manage-title">⚙️ 數據管理</div>
      <textarea id="jsonArea" class="json-area" placeholder="JSON 數據內容..."></textarea>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="form-btn sec" onclick="exportToJSON()">備份 (匯出)</button>
        <button class="form-btn sec" onclick="importFromJSON()">匯入</button>
        <button class="form-btn sec" onclick="resetData()">恢復預設值</button>
        <button class="form-btn danger" onclick="clearAllData()">🗑️ 全部清除</button>
      </div>
    </div>
  </div>

</div>

<script>
const defaultData = [
  // ===== 影響自主神經系統 =====
  {en:"Epinephrine",zh:"腎上腺素 (Adrenaline®, Bosmin®)",cat:"影響自主神經系統 (ANS) 藥物",note:"增加心臟收縮力、心搏速率，支氣管擴張。高劑量不增加存活率。"},
  {en:"Norepinephrine",zh:"正腎上腺素 (Levophed®)",cat:"影響自主神經系統 (ANS) 藥物",note:"收縮周邊小動脈使血壓上升，休克第一線藥物。漏針會導致組織壞死。"},
  {en:"Dopamine",zh:"多巴胺",cat:"影響自主神經系統 (ANS) 藥物",note:"中劑量提高心跳，高劑量收縮周邊血管。勿與鹼性溶液同管路。"},

let DATA = [];
let favorites = new Set();
let favOnly = false;
let fcIndex = 0;
let isFlipped = false;
let filtered = [];

// QUIZ STATE
let quizMode = 'en2zh';
let quizCount = 50;
let quizQuestions = [];
let quizCurrent = 0;
let quizScore = 0;
let quizWrong = [];
let quizAnswered = false;

function init(){
  loadData();
  applyFilter();
  updateCategorySelect();
  renderFlashcard();
  renderOverview();
  document.getElementById('quizPoolCount').textContent = DATA.length;
}

function loadData() {
  const s = localStorage.getItem('emt_vocab_data');
  const f = localStorage.getItem('emt_vocab_favs');
  DATA = s ? JSON.parse(s) : [...defaultData];
  favorites = f ? new Set(JSON.parse(f)) : new Set();
}

function saveData() {
  localStorage.setItem('emt_vocab_data', JSON.stringify(DATA));
  localStorage.setItem('emt_vocab_favs', JSON.stringify([...favorites]));
}

function deleteWord(en) {
  if(confirm(`確定要刪除「${en}」嗎？`)) {
    DATA = DATA.filter(d => d.en !== en);
    favorites.delete(en);
    saveData();
    refreshAll();
  }
}

function clearAllData() {
  if(confirm('⚠️ 警告：這將會永久刪除所有單字。')) {
    DATA = [];
    favorites.clear();
    saveData();
    refreshAll();
  }
}

function refreshAll() {
  applyFilter();
  updateCategorySelect();
  renderOverview();
  fcIndex = 0;
  renderFlashcard();
  document.getElementById('quizPoolCount').textContent = DATA.length;
}

function switchTab(t, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  const showCtrl = (t==='flash' || t==='overview');
  document.getElementById('mainControls').style.display = showCtrl ? 'flex' : 'none';
}

function applyFilter(){
  const cat = document.getElementById('catSelect').value;
  filtered = DATA.filter(d=>{
    if(cat!=='全部' && d.cat!==cat) return false;
    if(favOnly && !favorites.has(d.en)) return false;
    return true;
  });
}

function onFilterChange(){ applyFilter(); fcIndex=0; renderFlashcard(); renderOverview(); }

function toggleFavOnly(){
  favOnly = !favOnly;
  document.getElementById('favBtn').classList.toggle('on', favOnly);
  onFilterChange();
}

function shuffleCards(){
  filtered.sort(() => Math.random() - 0.5);
  fcIndex = 0;
  renderFlashcard();
}

function updateCategorySelect() {
  const sel = document.getElementById('catSelect');
  const cats = [...new Set(DATA.map(d=>d.cat))];
  sel.innerHTML = '<option value="全部">分類：全部</option>';
  cats.forEach(c=>{
    const o = document.createElement('option');
    o.value = o.textContent = c; sel.appendChild(o);
  });
}

function renderFlashcard(){
  if(filtered.length === 0){
    document.getElementById('fcEng').textContent = "目前無單字";
    document.getElementById('fcZh').textContent = "請在管理分頁恢復預設值";
    document.getElementById('fcCounter').textContent = "0 / 0";
    document.getElementById('fcProgress').style.width = '0%';
    return;
  }
  const item = filtered[fcIndex];
  document.getElementById('fcCounter').textContent = `${fcIndex+1} / ${filtered.length}`;
  document.getElementById('fcProgress').style.width = ((fcIndex+1)/filtered.length*100) + '%';
  document.getElementById('fcEng').textContent = item.en;
  document.getElementById('fcZh').textContent = item.zh;
  document.getElementById('fcCatF').textContent = item.cat;
  document.getElementById('fcCatB').textContent = item.cat;
  const noteEl = document.getElementById('fcNote');
  if(item.note){ noteEl.textContent = '📌 ' + item.note; noteEl.style.display='block'; }
  else { noteEl.style.display='none'; }
  updateFavBtns(item.en);
}

function flipCard(){ isFlipped = !isFlipped; document.getElementById('fcInner').classList.toggle('flipped', isFlipped); }
function nextCard(){ if(fcIndex < filtered.length-1){ fcIndex++; isFlipped=false; document.getElementById('fcInner').classList.remove('flipped'); renderFlashcard(); } }
function prevCard(){ if(fcIndex > 0){ fcIndex--; isFlipped=false; document.getElementById('fcInner').classList.remove('flipped'); renderFlashcard(); } }

function toggleFav(){
  const item = filtered[fcIndex];
  if(favorites.has(item.en)) favorites.delete(item.en); else favorites.add(item.en);
  saveData(); updateFavBtns(item.en);
}

function updateFavBtns(en){
  const isFav = favorites.has(en);
  document.getElementById('favBtnF').textContent = document.getElementById('favBtnB').textContent = isFav?'★':'☆';
}

function renderOverview(){
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = filtered.filter(d => d.en.toLowerCase().includes(q) || d.zh.includes(q));
  let html = '';
  list.forEach(d => {
    html += `
      <div class="vocab-row">
        <div class="vocab-row-top">
          <span class="eng">${d.en}</span>
          <span class="chi">${d.zh}</span>
          <span class="row-acts">
            <button onclick="deleteWord('${d.en.replace(/'/g,"\\'")}')" class="del">🗑️</button>
          </span>
        </div>
        ${d.note ? `<div class="vocab-note">📌 ${d.note}</div>` : ''}
      </div>`;
  });
  document.getElementById('ovList').innerHTML = html || '<div style="text-align:center;padding:20px;">無符合單字</div>';
}

function addSingleWord(){
  const en = document.getElementById('newEn').value.trim();
  const zh = document.getElementById('newZh').value.trim();
  const cat = document.getElementById('newCat').value.trim() || '自訂分類';
  if(!en || !zh) return alert('請輸入英文與中文');
  DATA.push({en, zh, cat});
  saveData();
  refreshAll();
  document.getElementById('newEn').value = document.getElementById('newZh').value = '';
  alert('已新增藥物！');
}

function resetData(){
  if(confirm('確定要還原成預設藥物庫嗎？')){
    DATA = [...defaultData];
    saveData();
    refreshAll();
  }
}

function exportToJSON(){
  document.getElementById('jsonArea').value = JSON.stringify(DATA, null, 2);
}

function importFromJSON(){
  try {
    const imported = JSON.parse(document.getElementById('jsonArea').value);
    if(Array.isArray(imported)){
      DATA = imported;
      saveData();
      refreshAll();
      alert('匯入成功！');
    }
  } catch(e) { alert('格式錯誤'); }
}

function speakWord(){
  const item = filtered[fcIndex];
  const u = new SpeechSynthesisUtterance(item.en);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

// ===== QUIZ ENGINE =====

function selectMode(m){
  quizMode = m;
  ['modeBtn1','modeBtn2','modeBtn3','modeBtn4'].forEach(id=>document.getElementById(id).classList.remove('selected'));
  const map = {en2zh:'modeBtn1',zh2en:'modeBtn2',cat2drug:'modeBtn3',mixed:'modeBtn4'};
  document.getElementById(map[m]).classList.add('selected');
}

function selectCount(n){
  quizCount = n;
  ['cntBtn10','cntBtn20','cntBtn50'].forEach(id=>document.getElementById(id).classList.remove('selected'));
  const map = {10:'cntBtn10',20:'cntBtn20',50:'cntBtn50'};
  document.getElementById(map[n]).classList.add('selected');
}

function shuffleArr(arr){ return arr.sort(()=>Math.random()-0.5); }

function getDistractors(correct, pool, key, n=3){
  const others = pool.filter(d=>d[key] !== correct[key]);
  const shuffled = shuffleArr([...others]);
  return shuffled.slice(0,n).map(d=>d[key]);
}

function buildQuestion(item, pool, forceMode){
  const mode = forceMode || quizMode;
  const cats = [...new Set(pool.map(d=>d.cat))];

  if(mode === 'en2zh'){
    const distractors = getDistractors(item, pool, 'zh');
    const options = shuffleArr([item.zh, ...distractors]);
    return { qtype:'英文 → 中文', question:`以下哪個是「${item.en}」的中文名稱？`, options, answer:item.zh, item };
  }
  if(mode === 'zh2en'){
    const distractors = getDistractors(item, pool, 'en');
    const options = shuffleArr([item.en, ...distractors]);
    return { qtype:'中文 → 英文', question:`「${item.zh.split(' ')[0]}」的英文藥名是？`, options, answer:item.en, item };
  }
  if(mode === 'cat2drug'){
    // give category, pick correct drug from options
    const distractors = getDistractors(item, pool, 'en');
    const options = shuffleArr([item.en, ...distractors]);
    return { qtype:'分類辨識', question:`哪一種藥物屬於「${item.cat}」分類？`, options, answer:item.en, item };
  }
  // mixed
  const modes = ['en2zh','zh2en','cat2drug'];
  return buildQuestion(item, pool, modes[Math.floor(Math.random()*modes.length)]);
}

function startQuiz(){
  if(DATA.length < 4){ alert('藥物庫至少需要 4 種藥物才能出題。'); return; }
  const pool = [...DATA];
  const count = Math.min(quizCount, pool.length);
  const selected = shuffleArr([...pool]).slice(0, count);
  quizQuestions = selected.map(item => buildQuestion(item, pool));
  quizCurrent = 0;
  quizScore = 0;
  quizWrong = [];

  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizArea').style.display = 'flex';
  renderQuestion();
}

function renderQuestion(){
  const q = quizQuestions[quizCurrent];
  quizAnswered = false;
  document.getElementById('quizCounter').textContent = `第 ${quizCurrent+1} / ${quizQuestions.length} 題`;
  document.getElementById('quizScoreBadge').textContent = `✅ ${quizScore} 分`;
  const pct = (quizCurrent / quizQuestions.length) * 100;
  document.getElementById('quizProgress').style.width = pct + '%';
  document.getElementById('quizQtype').textContent = q.qtype;
  document.getElementById('quizQuestion').textContent = q.question;

  const optContainer = document.getElementById('quizOptions');
  optContainer.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuestion(opt, q);
    optContainer.appendChild(btn);
  });

  const fb = document.getElementById('quizFeedback');
  fb.className = 'quiz-feedback';
  fb.textContent = '';
  document.getElementById('quizNextBtn').className = 'quiz-next-btn';
}

function answerQuestion(chosen, q){
  if(quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.answer;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(btn => {
    btn.disabled = true;
    if(btn.textContent === q.answer) btn.classList.add('correct');
    else if(btn.textContent === chosen && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  });

  const fb = document.getElementById('quizFeedback');
  if(isCorrect){
    quizScore++;
    fb.className = 'quiz-feedback show ok';
    fb.textContent = '✅ 答對了！';
  } else {
    quizWrong.push(q);
    fb.className = 'quiz-feedback show bad';
    fb.textContent = `❌ 答錯！正確答案：${q.answer}`;
  }
  document.getElementById('quizNextBtn').className = 'quiz-next-btn show';
}

function nextQuestion(){
  quizCurrent++;
  if(quizCurrent >= quizQuestions.length){
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult(){
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('quizResult').style.display = 'flex';
  const total = quizQuestions.length;
  const pct = Math.round(quizScore / total * 100);

  let emoji = '😢'; let msg = '繼續加油！';
  if(pct>=90){emoji='🏆';msg='優秀！幾乎全對！';}
  else if(pct>=75){emoji='🎉';msg='很好！繼續保持！';}
  else if(pct>=60){emoji='👍';msg='及格！再多練習！';}
  else if(pct>=40){emoji='📖';msg='需要多複習！';}

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = `${quizScore} / ${total}`;
  document.getElementById('resultSub').textContent = msg;
  document.getElementById('resCorrect').textContent = quizScore;
  document.getElementById('resWrong').textContent = total - quizScore;
  document.getElementById('resTotal').textContent = total;
  document.getElementById('resPct').textContent = pct + '%';

  const fill = document.getElementById('resultBarFill');
  fill.style.width = '0%';
  fill.style.background = pct>=75?'linear-gradient(90deg,#27ae60,#2ecc71)':pct>=60?'linear-gradient(90deg,#f39c12,#e67e22)':'linear-gradient(90deg,#d63031,#e74c3c)';
  setTimeout(()=>{ fill.style.width = pct + '%'; }, 100);

  // Wrong list
  const wl = document.getElementById('wrongList');
  if(quizWrong.length === 0){
    wl.innerHTML = '<div style="text-align:center;color:var(--success);font-weight:700;margin-top:16px;">🎯 全部答對！</div>';
  } else {
    let html = `<h3>❌ 答錯的題目 (${quizWrong.length} 題)</h3>`;
    quizWrong.forEach(q => {
      html += `<div class="wrong-item">
        <div class="wi-en">${q.item.en}</div>
        <div class="wi-zh">${q.item.zh}</div>
        ${q.item.note ? `<div class="wi-note">📌 ${q.item.note}</div>` : ''}
      </div>`;
    });
    wl.innerHTML = html;
  }
}

function restartQuiz(){
  document.getElementById('quizResult').style.display = 'none';
  startQuiz();
}

function backToStart(){
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('quizStart').style.display = 'flex';
  document.getElementById('quizPoolCount').textContent = DATA.length;
}

init();
</script>
