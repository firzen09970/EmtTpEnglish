<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新北市消防局 — EMT 常用英文字彙</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#c0392b;--primary-dark:#962d22;--primary-light:#e74c3c;
  --bg:#f0f2f5;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;
  --shadow:0 4px 20px rgba(0,0,0,.08);--radius:16px;
  --success:#27ae60;--warning:#f39c12;--danger:#d63031;
}

body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100dvh; 
  display:flex; flex-direction:column; overflow:hidden;
}

.header{background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#fff;padding:12px 20px 10px;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.header::before{content:'';position:absolute;inset:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(231,76,60,.12),transparent 50%);}
.header *{position:relative;}
.header .icon{font-size:1.6rem;margin-bottom:4px;}
.header h1{font-size:1.2rem;font-weight:700;}
.header .sub{font-size:.75rem;opacity:.6;margin-top:2px;}

.tabs{display:flex;justify-content:center;gap:6px;padding:8px 10px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;flex-wrap:wrap;flex-shrink:0;}
.tab-btn{padding:8px 18px;border:none;background:0;font-family:inherit;font-size:.9rem;font-weight:500;color:var(--text-light);cursor:pointer;border-radius:25px;transition:.25s;}
.tab-btn:hover{background:#f0f0f0;color:var(--text);}
.tab-btn.active{background:var(--primary);color:#fff;}

.controls{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 10px;flex-wrap:wrap;flex-shrink:0;}
.ctl-select,.ctl-btn{padding:6px 14px;border:2px solid #e0e0e0;border-radius:25px;font-family:inherit;font-size:.82rem;background:#fff;color:var(--text);cursor:pointer;outline:none;transition:.25s;}
.ctl-select:focus{border-color:var(--primary);}
.ctl-btn.on{border-color:var(--warning);background:#fff8e1;color:#e67e22;}

.container{max-width:680px;margin:0 auto;padding:0 12px 12px;flex:1;display:flex;flex-direction:column;width:100%;overflow-y:auto;}
.panel{display:none;}
.panel.active{display:flex;flex-direction:column;flex:1;}

/* Flashcard */
.fc-area{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding-top:5px;}
.fc-counter{font-size:.82rem;color:var(--text-light);margin-bottom:6px;}
.progress-track{width:100%;max-width:480px;height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:12px;overflow:hidden;flex-shrink:0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#e74c3c);border-radius:2px;transition:width .4s;}

.fc-wrap{perspective:1200px;width:100%;max-width:480px;flex:1;min-height:200px;max-height:40vh;margin-bottom:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:var(--shadow);}
.fc-front{background:#fff;}
.fc-back{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;transform:rotateY(180deg);}
.fc-cat{font-size:.72rem;padding:3px 12px;border-radius:20px;background:rgba(0,0,0,.06);color:var(--text-light);margin-bottom:14px;}
.fc-word{font-size:2rem;font-weight:700;text-align:center;line-height:1.35;}
.fc-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px;}
.act-btn{width:38px;height:38px;border:none;background:rgba(0,0,0,.05);border-radius:50%;cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.act-btn.fav{color:#f39c12;}

.fc-nav{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.nav-btn{padding:11px 26px;border:none;background:#fff;font-family:inherit;font-size:.88rem;font-weight:500;color:var(--text);cursor:pointer;border-radius:25px;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:.2s;}
.nav-btn.flip{background:var(--primary);color:#fff;}

/* Overview */
.search-box{width:100%;padding:11px 20px;border:2px solid #e0e0e0;border-radius:25px;font-family:inherit;font-size:.92rem;outline:none;transition:.25s;margin:10px 0 14px;}
.vocab-row{display:flex;align-items:center;padding:12px 14px;background:#fff;border-radius:12px;margin-bottom:5px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:.2s;cursor:pointer;}
.vocab-row .eng{font-weight:600;font-size:.92rem;flex:1;}
.vocab-row .chi{font-size:.88rem;color:var(--text-light);margin-left:10px;}
.vocab-row .row-acts{display:flex;gap:2px;margin-left:10px;}
.vocab-row .row-acts button{width:32px;height:32px;border:none;background:0;cursor:pointer;border-radius:50%;font-size:.88rem;transition:.2s;}
.vocab-row .row-acts button.fav{color:#f39c12;}
.vocab-row .row-acts button.del{color:var(--danger);}

/* Manage */
.manage-section{background:#fff;padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);margin-top:16px;}
.manage-title{font-size:1.05rem;font-weight:700;color:var(--primary);margin-bottom:16px;border-bottom:2px solid #f0f2f5;padding-bottom:8px;}
.form-group{margin-bottom:12px;}
.form-input{width:100%;padding:11px 16px;border:2px solid #e0e0e0;border-radius:12px;font-family:inherit;font-size:.92rem;outline:none;}
.form-btn{padding:10px 20px;border:none;background:var(--primary);color:#fff;font-family:inherit;font-size:.9rem;font-weight:500;border-radius:12px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.form-btn.sec{background:#e0e0e0;color:var(--text);}
.form-btn.danger{background:var(--danger);}
.json-area{width:100%;height:100px;padding:12px;border:2px solid #e0e0e0;border-radius:12px;font-family:monospace;font-size:.85rem;resize:vertical;margin-bottom:12px;}

@media(max-width:480px){
  .header h1{font-size:1.05rem;}
  .tab-btn{padding:6px 10px;font-size:.8rem;}
  .form-btn{width:100%;margin-bottom:8px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="icon">🚑</div>
  <h1>新北市消防局 EMT 常用英文字彙</h1>
  <div class="sub">思婕整理 · 全方位背單字學習工具</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('flash')">📇 閃卡</button>
  <button class="tab-btn" onclick="switchTab('overview')">📖 總覽</button>
  <button class="tab-btn" onclick="switchTab('quiz')">📝 測驗</button>
  <button class="tab-btn" onclick="switchTab('manage')">⚙️ 管理</button>
</div>

<div class="controls" id="mainControls">
  <select class="ctl-select" id="catSelect" onchange="onFilterChange()">
    <option value="全部">分類：全部</option>
  </select>
  <button class="ctl-btn" id="favBtn" onclick="toggleFavOnly()">⭐ 只顯示最愛</button>
  <button class="ctl-btn" id="shuffleBtn" onclick="shuffleCards()">🔀 隨機排序</button>
</div>

<div class="container">

  <div class="panel active" id="panel-flash">
    <div class="fc-area">
      <div class="fc-counter" id="fcCounter">0 / 0</div>
      <div class="progress-track"><div class="progress-fill" id="fcProgress" style="width:0%"></div></div>
      <div class="fc-wrap" id="fcWrap" onclick="flipCard()">
        <div class="fc-inner" id="fcInner">
          <div class="fc-face fc-front" id="fcFront">
            <div class="fc-actions">
              <button class="act-btn" onclick="event.stopPropagation();speakWord()">🔊</button>
              <button class="act-btn" id="favBtnF" onclick="event.stopPropagation();toggleFav()">☆</button>
            </div>
            <div class="fc-cat" id="fcCatF"></div>
            <div class="fc-word" id="fcEng"></div>
            <div class="fc-hint">點擊翻面</div>
          </div>
          <div class="fc-face fc-back" id="fcBack">
            <div class="fc-actions">
              <button class="act-btn" onclick="event.stopPropagation();speakWord()">🔊</button>
              <button class="act-btn" id="favBtnB" onclick="event.stopPropagation();toggleFav()">☆</button>
            </div>
            <div class="fc-cat" id="fcCatB"></div>
            <div class="fc-word" id="fcZh"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevCard()">←</button>
        <button class="nav-btn flip" onclick="flipCard()">翻面</button>
        <button class="nav-btn" id="nextBtn" onclick="nextCard()">→</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-overview">
    <input class="search-box" id="searchBox" placeholder="🔍 搜尋單字…" oninput="renderOverview()">
    <div id="ovList"></div>
  </div>

  <div class="panel" id="panel-quiz">
    <div class="qz-area" id="qzArea">
       <button class="qz-next" onclick="startQuiz()">開始測驗</button>
    </div>
    <div id="qzContent"></div>
  </div>

  <div class="panel" id="panel-manage">
    <div class="manage-section">
      <div class="manage-title">➕ 新增單字</div>
      <input type="text" id="newEn" class="form-input" placeholder="英文 (例: Splint)" style="margin-bottom:8px;">
      <input type="text" id="newZh" class="form-input" placeholder="中文 (例: 夾板)" style="margin-bottom:8px;">
      <input type="text" id="newCat" class="form-input" placeholder="分類 (預設: 自訂分類)" style="margin-bottom:8px;">
      <button class="form-btn" onclick="addSingleWord()">加入單字庫</button>
      <div id="addMsg" style="margin-top:8px; font-size:0.8rem;"></div>
    </div>

    <div class="manage-section">
      <div class="manage-title">⚙️ 數據管理</div>
      <textarea id="jsonArea" class="json-area" placeholder="JSON 數據內容..."></textarea>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="form-btn sec" onclick="exportToJSON()">備份 (匯出)</button>
        <button class="form-btn sec" onclick="importFromJSON()">匯入</button>
        <button class="form-btn sec" onclick="resetData()">恢復預設值</button>
        <button class="form-btn danger" onclick="clearAllData()">🗑️ 全部清除</button>
      </div>
      <div id="jsonMsg" style="margin-top:8px; font-size:0.8rem;"></div>
    </div>
  </div>

</div>

<script>
// (數據部分與原本相同，略過不重寫以節省篇幅)
const defaultData = [
  {en:"Blood pressure",zh:"血壓",cat:"生命徵象"},
  {en:"Pulse",zh:"脈搏",cat:"生命徵象"},
  {en:"Heart rate",zh:"心率",cat:"生命徵象"},
  {en:"Respiratory rate",zh:"呼吸速率",cat:"生命徵象"},
  {en:"Body temperature",zh:"體溫",cat:"生命徵象"},
  {en:"Oxygen saturation (SpO2)",zh:"血氧飽和度",cat:"生命徵象"},
  {en:"Systolic",zh:"收縮壓",cat:"生命徵象"},
  {en:"Diastolic",zh:"舒張壓",cat:"生命徵象"},
  {en:"Consciousness",zh:"意識",cat:"生命徵象"},
  {en:"Glasgow Coma Scale (GCS)",zh:"昏迷指數",cat:"生命徵象"},
  {en:"Chest pain",zh:"胸痛",cat:"症狀"},
  {en:"Shortness of breath",zh:"呼吸困難",cat:"症狀"},
  {en:"Dizziness",zh:"頭暈",cat:"症狀"},
  {en:"Nausea",zh:"噁心",cat:"症狀"},
  {en:"Vomiting",zh:"嘔吐",cat:"症狀"},
  {en:"Seizure",zh:"癲癇發作",cat:"症狀"},
  {en:"Bleeding",zh:"出血",cat:"症狀"},
  {en:"Fever",zh:"發燒",cat:"症狀"},
  {en:"Headache",zh:"頭痛",cat:"症狀"},
  {en:"Abdominal pain",zh:"腹痛",cat:"症狀"},
  {en:"Stretcher",zh:"擔架",cat:"器材裝備"},
  {en:"Stethoscope",zh:"聽診器",cat:"器材裝備"},
  {en:"Defibrillator (AED)",zh:"自動體外心臟電擊去顫器",cat:"器材裝備"},
  {en:"CPR",zh:"心肺復甦術",cat:"處置技術"},
  {en:"Stroke",zh:"中風",cat:"傷病狀況"}
];

let DATA = [];
let favorites = new Set();
let favOnly = false;
let fcIndex = 0;
let isFlipped = false;
let filtered = [];

// 初始化
function init(){
  loadData();
  applyFilter();
  updateCategorySelect();
  renderFlashcard();
  renderOverview();
}

function loadData() {
  const s = localStorage.getItem('emt_vocab_data');
  const f = localStorage.getItem('emt_vocab_favs');
  DATA = s ? JSON.parse(s) : [...defaultData];
  favorites = f ? new Set(JSON.parse(f)) : new Set();
}

function saveData() {
  localStorage.setItem('emt_vocab_data', JSON.stringify(DATA));
  localStorage.setItem('emt_vocab_favs', JSON.stringify([...favorites]));
}

// 刪除單個單字 (在總覽分頁中使用)
function deleteWord(en) {
  if(confirm(`確定要刪除「${en}」嗎？`)) {
    DATA = DATA.filter(d => d.en !== en);
    favorites.delete(en);
    saveData();
    refreshAll();
  }
}

// 清除所有數據
function clearAllData() {
  if(confirm('⚠️ 警告：這將會永久刪除所有單字。此操作無法復原，確定要清空嗎？')) {
    DATA = [];
    favorites.clear();
    saveData();
    refreshAll();
    alert('已清空所有單字庫。');
  }
}

function refreshAll() {
  applyFilter();
  updateCategorySelect();
  renderOverview();
  fcIndex = 0;
  renderFlashcard();
}

// --- 介面切換與渲染 ---
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  document.getElementById('mainControls').style.display = (t==='manage') ? 'none' : 'flex';
}

function applyFilter(){
  const cat = document.getElementById('catSelect').value;
  filtered = DATA.filter(d=>{
    if(cat!=='全部' && d.cat!==cat) return false;
    if(favOnly && !favorites.has(d.en)) return false;
    return true;
  });
}

function onFilterChange(){ applyFilter(); fcIndex=0; renderFlashcard(); renderOverview(); }

function updateCategorySelect() {
  const sel = document.getElementById('catSelect');
  const cats = [...new Set(DATA.map(d=>d.cat))];
  sel.innerHTML = '<option value="全部">分類：全部</option>';
  cats.forEach(c=>{
    const o = document.createElement('option');
    o.value = o.textContent = c; sel.appendChild(o);
  });
}

// 閃卡渲染
function renderFlashcard(){
  const wrap = document.getElementById('panel-flash');
  if(filtered.length === 0){
    document.getElementById('fcEng').textContent = "目前無單字";
    document.getElementById('fcZh').textContent = "請在管理分頁新增或恢復預設";
    return;
  }
  const item = filtered[fcIndex];
  document.getElementById('fcCounter').textContent = `${fcIndex+1} / ${filtered.length}`;
  document.getElementById('fcProgress').style.width = ((fcIndex+1)/filtered.length*100) + '%';
  document.getElementById('fcEng').textContent = item.en;
  document.getElementById('fcZh').textContent = item.zh;
  document.getElementById('fcCatF').textContent = item.cat;
  document.getElementById('fcCatB').textContent = item.cat;
  updateFavBtns(item.en);
}

function flipCard(){ isFlipped = !isFlipped; document.getElementById('fcInner').classList.toggle('flipped', isFlipped); }
function nextCard(){ if(fcIndex < filtered.length-1){ fcIndex++; isFlipped=false; renderFlashcard(); } }
function prevCard(){ if(fcIndex > 0){ fcIndex--; isFlipped=false; renderFlashcard(); } }

function toggleFav(){
  const item = filtered[fcIndex];
  if(favorites.has(item.en)) favorites.delete(item.en); else favorites.add(item.en);
  saveData(); updateFavBtns(item.en);
}

function updateFavBtns(en){
  const isFav = favorites.has(en);
  document.getElementById('favBtnF').textContent = document.getElementById('favBtnB').textContent = isFav?'★':'☆';
}

// 總覽渲染
function renderOverview(){
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = filtered.filter(d => d.en.toLowerCase().includes(q) || d.zh.includes(q));
  let html = '';
  list.forEach(d => {
    const isFav = favorites.has(d.en);
    html += `
      <div class="vocab-row">
        <span class="eng">${d.en}</span>
        <span class="chi">${d.zh}</span>
        <span class="row-acts">
          <button onclick="deleteWord('${d.en.replace(/'/g,"\\'")}')" class="del">🗑️</button>
        </span>
      </div>`;
  });
  document.getElementById('ovList').innerHTML = html || '<div style="text-align:center;padding:20px;">無符合單字</div>';
}

// 管理功能
function addSingleWord(){
  const en = document.getElementById('newEn').value.trim();
  const zh = document.getElementById('newZh').value.trim();
  const cat = document.getElementById('newCat').value.trim() || '自訂分類';
  if(!en || !zh) return alert('請輸入英文與中文');
  DATA.push({en, zh, cat});
  saveData();
  refreshAll();
  document.getElementById('newEn').value = '';
  document.getElementById('newZh').value = '';
  alert('已新增！');
}

function resetData(){
  if(confirm('確定要還原成預設字庫嗎？您新增的單字會消失。')){
    DATA = [...defaultData];
    saveData();
    refreshAll();
  }
}

function exportToJSON(){
  document.getElementById('jsonArea').value = JSON.stringify(DATA, null, 2);
}

function importFromJSON(){
  try {
    const imported = JSON.parse(document.getElementById('jsonArea').value);
    if(Array.isArray(imported)){
      DATA = imported;
      saveData();
      refreshAll();
      alert('匯入成功！');
    }
  } catch(e) { alert('格式錯誤'); }
}

function speakWord(){
  const item = filtered[fcIndex];
  const u = new SpeechSynthesisUtterance(item.en);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

// 啟動
init();
</script>
</body>
</html>
