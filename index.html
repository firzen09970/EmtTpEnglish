<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新北市消防局 — EMT 常用英文字彙</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#c0392b;--primary-dark:#962d22;--primary-light:#e74c3c;
  --bg:#f0f2f5;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;
  --shadow:0 4px 20px rgba(0,0,0,.08);--radius:16px;
  --success:#27ae60;--warning:#f39c12;
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e,#16213e 50%,#0f3460);color:#fff;padding:28px 20px 22px;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(231,76,60,.12),transparent 50%);}
.header *{position:relative;}
.header .icon{font-size:2.2rem;margin-bottom:6px;}
.header h1{font-size:1.4rem;font-weight:700;}
.header .sub{font-size:.82rem;opacity:.6;margin-top:4px;}

/* Tabs */
.tabs{display:flex;justify-content:center;gap:6px;padding:14px 16px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.tab-btn{padding:9px 22px;border:none;background:0;font-family:inherit;font-size:.92rem;font-weight:500;color:var(--text-light);cursor:pointer;border-radius:25px;transition:.25s;}
.tab-btn:hover{background:#f0f0f0;color:var(--text);}
.tab-btn.active{background:var(--primary);color:#fff;}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 16px;flex-wrap:wrap;}
.ctl-select,.ctl-btn{padding:7px 16px;border:2px solid #e0e0e0;border-radius:25px;font-family:inherit;font-size:.82rem;background:#fff;color:var(--text);cursor:pointer;outline:none;transition:.25s;}
.ctl-select:focus{border-color:var(--primary);}
.ctl-btn.on{border-color:var(--warning);background:#fff8e1;color:#e67e22;}

.container{max-width:680px;margin:0 auto;padding:0 16px 50px;}
.panel{display:none;}.panel.active{display:block;}

/* ===== FLASHCARD ===== */
.fc-area{display:flex;flex-direction:column;align-items:center;padding-top:16px;}
.fc-counter{font-size:.82rem;color:var(--text-light);margin-bottom:10px;}
.progress-track{width:100%;max-width:480px;height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:18px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#e74c3c);border-radius:2px;transition:width .4s;}

.fc-wrap{perspective:1200px;width:100%;max-width:480px;height:270px;margin-bottom:22px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;box-shadow:var(--shadow);}
.fc-front{background:#fff;}
.fc-back{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;transform:rotateY(180deg);}
.fc-cat{font-size:.72rem;padding:3px 12px;border-radius:20px;background:rgba(0,0,0,.06);color:var(--text-light);margin-bottom:14px;}
.fc-back .fc-cat{background:rgba(255,255,255,.18);color:rgba(255,255,255,.85);}
.fc-word{font-size:2rem;font-weight:700;text-align:center;line-height:1.35;}
.fc-hint{font-size:.78rem;color:var(--text-light);margin-top:auto;}
.fc-back .fc-hint{color:rgba(255,255,255,.45);}
.fc-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px;}
.act-btn{width:38px;height:38px;border:none;background:rgba(0,0,0,.05);border-radius:50%;cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
.act-btn:hover{background:rgba(0,0,0,.1);transform:scale(1.1);}
.fc-back .act-btn{background:rgba(255,255,255,.14);}
.fc-back .act-btn:hover{background:rgba(255,255,255,.25);}
.act-btn.fav{color:#f39c12;}

.fc-nav{display:flex;align-items:center;gap:12px;}
.nav-btn{padding:11px 26px;border:none;background:#fff;font-family:inherit;font-size:.88rem;font-weight:500;color:var(--text);cursor:pointer;border-radius:25px;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:.2s;}
.nav-btn:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);transform:translateY(-1px);}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none;}
.nav-btn.flip{background:var(--primary);color:#fff;}.nav-btn.flip:hover{background:var(--primary-dark);}
.kbd-hint{text-align:center;font-size:.75rem;color:var(--text-light);margin-top:18px;}
.kbd-hint kbd{display:inline-block;padding:1px 7px;background:#e8e8e8;border-radius:4px;font-family:inherit;font-size:.72rem;margin:0 2px;}

/* ===== OVERVIEW ===== */
.search-box{width:100%;padding:11px 20px;border:2px solid #e0e0e0;border-radius:25px;font-family:inherit;font-size:.92rem;outline:none;transition:.25s;margin:14px 0 16px;}
.search-box:focus{border-color:var(--primary);}
.ov-stats{text-align:center;font-size:.82rem;color:var(--text-light);margin-bottom:14px;}
.grp-title{font-size:.82rem;font-weight:700;color:var(--primary);padding:10px 0 6px;border-bottom:2px solid var(--primary);margin:18px 0 8px;}
.vocab-row{display:flex;align-items:center;padding:12px 14px;background:#fff;border-radius:12px;margin-bottom:5px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:.2s;cursor:pointer;}
.vocab-row:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateX(4px);}
.vocab-row .eng{font-weight:600;font-size:.92rem;flex:1;}
.vocab-row .chi{font-size:.88rem;color:var(--text-light);margin-left:10px;}
.vocab-row .row-acts{display:flex;gap:2px;margin-left:10px;}
.vocab-row .row-acts button{width:32px;height:32px;border:none;background:0;cursor:pointer;border-radius:50%;font-size:.88rem;transition:.2s;}
.vocab-row .row-acts button:hover{background:#f0f0f0;}
.vocab-row .row-acts button.fav{color:#f39c12;}
.vocab-row .row-acts button.del{color:var(--primary-light);}

/* ===== QUIZ ===== */
.qz-area{display:flex;flex-direction:column;align-items:center;padding-top:16px;}
.qz-modes{display:flex;gap:6px;margin-bottom:14px;}
.qz-mode{padding:6px 14px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-family:inherit;font-size:.78rem;cursor:pointer;transition:.25s;}
.qz-mode.active{border-color:var(--primary);background:var(--primary);color:#fff;}
.qz-info{font-size:.85rem;color:var(--text-light);margin-bottom:6px;}
.qz-info b{color:var(--text);font-size:1.05rem;}
.qz-card{width:100%;max-width:480px;background:#fff;border-radius:var(--radius);padding:30px 28px;box-shadow:var(--shadow);text-align:center;}
.qz-label{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:10px;}
.qz-q{font-size:1.7rem;font-weight:700;margin-bottom:26px;line-height:1.3;}
.qz-opts{display:flex;flex-direction:column;gap:9px;}
.qz-opt{padding:13px 18px;border:2px solid #e8e8e8;border-radius:12px;background:#fff;font-family:inherit;font-size:.95rem;cursor:pointer;transition:.2s;text-align:left;}
.qz-opt:hover:not(:disabled){border-color:var(--primary);background:#fff5f5;}
.qz-opt.correct{border-color:var(--success);background:#eafaf1;color:var(--success);font-weight:600;}
.qz-opt.wrong{border-color:var(--primary-light);background:#fdecea;color:var(--primary-light);}
.qz-opt:disabled{cursor:default;}
.qz-next{margin-top:18px;padding:11px 30px;border:none;background:var(--primary);color:#fff;font-family:inherit;font-size:.92rem;font-weight:500;border-radius:25px;cursor:pointer;transition:.2s;}
.qz-next:hover{background:var(--primary-dark);}
.qz-result{text-align:center;padding:40px 20px;}
.qz-result .big{font-size:3rem;font-weight:900;color:var(--primary);}
.qz-result .lbl{font-size:1rem;color:var(--text-light);margin-top:6px;}
.empty{text-align:center;padding:60px 20px;color:var(--text-light);}
.empty .em{font-size:2.8rem;margin-bottom:10px;}

/* ===== MANAGE (NEW) ===== */
.manage-section{background:#fff;padding:24px;border-radius:var(--radius);box-shadow:var(--shadow);margin-top:16px;}
.manage-title{font-size:1.05rem;font-weight:700;color:var(--primary);margin-bottom:16px;border-bottom:2px solid #f0f2f5;padding-bottom:8px;}
.form-group{margin-bottom:12px;}
.form-input{width:100%;padding:11px 16px;border:2px solid #e0e0e0;border-radius:12px;font-family:inherit;font-size:.92rem;outline:none;transition:.25s;}
.form-input:focus{border-color:var(--primary);}
.form-btn{padding:10px 20px;border:none;background:var(--primary);color:#fff;font-family:inherit;font-size:.9rem;font-weight:500;border-radius:12px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.form-btn:hover{background:var(--primary-dark);}
.form-btn.sec{background:#e0e0e0;color:var(--text);}
.form-btn.sec:hover{background:#d0d0d0;}
.form-btn.succ{background:var(--success);}
.form-btn.succ:hover{background:#219653;}
.json-area{width:100%;height:140px;padding:12px;border:2px solid #e0e0e0;border-radius:12px;font-family:monospace;font-size:.85rem;resize:vertical;margin-bottom:12px;outline:none;}
.json-area:focus{border-color:var(--primary);}
.msg-box{font-size:.85rem;margin-top:10px;min-height:20px;font-weight:500;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.shake{animation:shake .35s ease;}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}
.pop{animation:pop .25s ease;}

@media(max-width:480px){
  .fc-wrap{height:230px;}.fc-word{font-size:1.5rem;}.qz-q{font-size:1.35rem;}
  .nav-btn{padding:9px 18px;font-size:.82rem;}.tab-btn{padding:7px 14px;font-size:.82rem;}
  .form-btn{width:100%;margin-bottom:8px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="icon">🚑</div>
  <h1>新北市消防局 EMT 常用英文字彙</h1>
  <div class="sub">思婕整理 · 全方位背單字學習工具</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('flash')">📇 閃卡</button>
  <button class="tab-btn" onclick="switchTab('overview')">📖 總覽</button>
  <button class="tab-btn" onclick="switchTab('quiz')">📝 測驗</button>
  <button class="tab-btn" onclick="switchTab('manage')">⚙️ 新增 / 管理</button>
</div>

<div class="controls" id="mainControls">
  <select class="ctl-select" id="catSelect" onchange="onFilterChange()">
    <option value="全部">分類：全部</option>
  </select>
  <button class="ctl-btn" id="favBtn" onclick="toggleFavOnly()">⭐ 只顯示最愛</button>
  <button class="ctl-btn" id="shuffleBtn" onclick="shuffleCards()">🔀 隨機排序</button>
</div>

<div class="container">

  <div class="panel active" id="panel-flash">
    <div class="fc-area">
      <div class="fc-counter" id="fcCounter">0 / 0</div>
      <div class="progress-track"><div class="progress-fill" id="fcProgress" style="width:0%"></div></div>
      <div class="fc-wrap" id="fcWrap" onclick="flipCard()">
        <div class="fc-inner" id="fcInner">
          <div class="fc-face fc-front" id="fcFront">
            <div class="fc-actions">
              <button class="act-btn" id="speakBtnF" onclick="event.stopPropagation();speakWord()">🔊</button>
              <button class="act-btn" id="favBtnF" onclick="event.stopPropagation();toggleFav()">☆</button>
            </div>
            <div class="fc-cat" id="fcCatF"></div>
            <div class="fc-word" id="fcEng"></div>
            <div class="fc-hint">點擊翻面看中文</div>
          </div>
          <div class="fc-face fc-back" id="fcBack">
            <div class="fc-actions">
              <button class="act-btn" id="speakBtnB" onclick="event.stopPropagation();speakWord()">🔊</button>
              <button class="act-btn" id="favBtnB" onclick="event.stopPropagation();toggleFav()">☆</button>
            </div>
            <div class="fc-cat" id="fcCatB"></div>
            <div class="fc-word" id="fcZh"></div>
            <div class="fc-hint">點擊翻回英文</div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevCard()">← 上一張</button>
        <button class="nav-btn flip" onclick="flipCard()">翻面</button>
        <button class="nav-btn" id="nextBtn" onclick="nextCard()">下一張 →</button>
      </div>
      <div class="kbd-hint">鍵盤：<kbd>←</kbd> <kbd>→</kbd> 切換 · <kbd>Space</kbd> 翻面 · <kbd>S</kbd> 發音</div>
    </div>
  </div>

  <div class="panel" id="panel-overview">
    <input class="search-box" id="searchBox" placeholder="🔍 搜尋英文或中文…" oninput="renderOverview()">
    <div class="ov-stats" id="ovStats"></div>
    <div id="ovList"></div>
  </div>

  <div class="panel" id="panel-quiz">
    <div class="qz-area">
      <div class="qz-modes">
        <button class="qz-mode active" onclick="setQuizMode('en2zh',this)">英 → 中</button>
        <button class="qz-mode" onclick="setQuizMode('zh2en',this)">中 → 英</button>
      </div>
      <div class="qz-info" id="qzInfo">得分：<b>0 / 0</b></div>
      <div class="progress-track" style="max-width:480px;margin-bottom:18px;"><div class="progress-fill" id="qzProgress" style="width:0%"></div></div>
      <div id="qzContent"></div>
      <button class="qz-next" id="qzStart" onclick="startQuiz()">開始測驗（10 題）</button>
    </div>
  </div>

  <div class="panel" id="panel-manage">
    <div class="manage-section fade-in">
      <div class="manage-title">➕ 新增單字</div>
      <div class="form-group"><input type="text" id="newEn" class="form-input" placeholder="英文單字 (例: Splint)"></div>
      <div class="form-group"><input type="text" id="newZh" class="form-input" placeholder="中文意思 (例: 夾板)"></div>
      <div class="form-group"><input type="text" id="newCat" class="form-input" placeholder="分類 (例: 器材裝備，留白則為『自訂分類』)"></div>
      <button class="form-btn" onclick="addSingleWord()">加入單字庫</button>
      <div id="addMsg" class="msg-box" style="color:var(--success);"></div>
    </div>

    <div class="manage-section fade-in" style="animation-delay: 0.1s;">
      <div class="manage-title">📄 JSON 批次匯入 / 匯出</div>
      <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:12px;">格式範例：<code>[{"en":"Apple", "zh":"蘋果", "cat":"水果"}]</code></p>
      <textarea id="jsonArea" class="json-area" placeholder="在此貼上 JSON 以匯入，或點擊下方按鈕匯出現有資料..."></textarea>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="form-btn" onclick="importFromJSON()">⬇️ 匯入 JSON</button>
        <button class="form-btn succ" onclick="exportToJSON()">⬆️ 匯出 JSON</button>
        <button class="form-btn sec" onclick="resetData()">🔄 還原預設單字庫</button>
      </div>
      <div id="jsonMsg" class="msg-box"></div>
    </div>
  </div>

</div>

<script>
// ===== DEFAULT DATA =====
const defaultData = [
  {en:"Blood pressure",zh:"血壓",cat:"生命徵象"},
  {en:"Pulse",zh:"脈搏",cat:"生命徵象"},

  {en:"Abdomen",zh:"腹部",cat:"解剖位置"},

  {en:"Airway",zh:"呼吸道",cat:"解剖位置"},
  {en:"Femur",zh:"股骨",cat:"解剖位置"},
  {en:"Cranium",zh:"顱骨",cat:"解剖位置"},
  {en:"Cervical spine",zh:"頸椎",cat:"解剖位置"},
  {en:"Tibia",zh:"脛骨",cat:"解剖位置"}
];

// ===== STATE =====
let DATA = [];
let favorites = new Set();
let favOnly = false;
let currentTab = 'flash';
let filtered = [];
let fcIndex = 0;
let isFlipped = false;

let quizMode = 'en2zh';
let quizQuestions = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;
let quizTotal = 10;

// ===== INIT & STORAGE =====
function init(){
  loadData();
  updateCategorySelect();
  applyFilter();
  renderFlashcard();
  renderOverview();
}

function loadData() {
  const savedData = localStorage.getItem('emt_vocab_data');
  const savedFavs = localStorage.getItem('emt_vocab_favs');
  
  if(savedData) {
    try { DATA = JSON.parse(savedData); } catch(e) { DATA = [...defaultData]; }
  } else {
    DATA = [...defaultData];
  }

  if(savedFavs) {
    try { favorites = new Set(JSON.parse(savedFavs)); } catch(e) { favorites = new Set(); }
  }
}

function saveData() {
  localStorage.setItem('emt_vocab_data', JSON.stringify(DATA));
  localStorage.setItem('emt_vocab_favs', JSON.stringify([...favorites]));
}

function updateCategorySelect() {
  const sel = document.getElementById('catSelect');
  const currentVal = sel.value;
  const cats = [...new Set(DATA.map(d=>d.cat))];
  
  sel.innerHTML = '<option value="全部">分類：全部</option>';
  cats.forEach(c=>{
    const o = document.createElement('option');
    o.value = c; o.textContent = c; sel.appendChild(o);
  });
  
  if(cats.includes(currentVal)) sel.value = currentVal;
  else sel.value = '全部';
}

// ===== MANAGE (NEW) =====
function showMsg(id, msg, isErr=false) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.color = isErr ? 'var(--primary)' : 'var(--success)';
  setTimeout(() => el.textContent='', 4000);
}

function addSingleWord() {
  const en = document.getElementById('newEn').value.trim();
  const zh = document.getElementById('newZh').value.trim();
  const cat = document.getElementById('newCat').value.trim() || '自訂分類';
  
  if(!en || !zh) {
    showMsg('addMsg', '⚠️ 英文與中文為必填欄位！', true);
    return;
  }
  if(DATA.find(d => d.en.toLowerCase() === en.toLowerCase())) {
    showMsg('addMsg', '⚠️ 此單字已存在於字庫中！', true);
    return;
  }
  
  DATA.push({en, zh, cat});
  saveData();
  updateCategorySelect();
  applyFilter();
  
  document.getElementById('newEn').value = '';
  document.getElementById('newZh').value = '';
  document.getElementById('newCat').value = '';
  showMsg('addMsg', `✅ 成功新增單字：${en}`);
}

function importFromJSON() {
  const val = document.getElementById('jsonArea').value.trim();
  if(!val) {
    showMsg('jsonMsg', '⚠️ 請先在上方貼上 JSON 內容！', true);
    return;
  }
  try {
    const arr = JSON.parse(val);
    if(!Array.isArray(arr)) throw new Error('必須是陣列格式');
    
    let addedCount = 0;
    arr.forEach(item => {
      if(item.en && item.zh) {
        const cat = item.cat || '自訂分類';
        if(!DATA.find(d => d.en.toLowerCase() === item.en.toLowerCase())) {
          DATA.push({en: String(item.en).trim(), zh: String(item.zh).trim(), cat: String(cat).trim()});
          addedCount++;
        }
      }
    });
    
    saveData();
    updateCategorySelect();
    applyFilter();
    document.getElementById('jsonArea').value = '';
    showMsg('jsonMsg', `✅ 成功匯入 ${addedCount} 個新單字！`);
  } catch(e) {
    showMsg('jsonMsg', '❌ JSON 格式錯誤，請確保格式為 [{"en":"...", "zh":"...", "cat":"..."}]', true);
  }
}

function exportToJSON() {
  document.getElementById('jsonArea').value = JSON.stringify(DATA, null, 2);
  showMsg('jsonMsg', '✅ 已成功匯出目前所有資料至上方文字框，請全選複製。');
}

function resetData() {
  if(confirm('⚠️ 警告：這將會刪除所有您自行新增的單字，並還原為預設字庫。確定要繼續嗎？')) {
    DATA = [...defaultData];
    saveData();
    updateCategorySelect();
    applyFilter();
    renderOverview();
    renderFlashcard();
    document.getElementById('jsonArea').value = '';
    showMsg('jsonMsg', '✅ 已還原為預設字庫！');
  }
}

function deleteWord(en) {
  if(confirm(`確定要刪除單字「${en}」嗎？`)) {
    DATA = DATA.filter(d => d.en !== en);
    favorites.delete(en);
    saveData();
    updateCategorySelect();
    applyFilter();
    renderOverview();
    
    // 如果在閃卡頁面刪除到最後一張，需重算索引
    if(fcIndex >= filtered.length) fcIndex = Math.max(0, filtered.length - 1);
    renderFlashcard();
  }
}

// ===== FILTER =====
function applyFilter(){
  const cat = document.getElementById('catSelect').value;
  filtered = DATA.filter(d=>{
    if(cat!=='全部' && d.cat!==cat) return false;
    if(favOnly && !favorites.has(d.en)) return false;
    return true;
  });
}
function onFilterChange(){
  applyFilter();
  fcIndex=0; isFlipped=false;
  renderFlashcard();
  renderOverview();
}
function toggleFavOnly(){
  favOnly=!favOnly;
  document.getElementById('favBtn').classList.toggle('on',favOnly);
  document.getElementById('favBtn').textContent=favOnly?'⭐ 顯示全部':'⭐ 只顯示最愛';
  onFilterChange();
}
function shuffleCards(){
  for(let i=filtered.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[filtered[i],filtered[j]]=[filtered[j],filtered[i]];}
  fcIndex=0;isFlipped=false;
  renderFlashcard();
  const btn=document.getElementById('shuffleBtn');
  btn.classList.add('pop');setTimeout(()=>btn.classList.remove('pop'),300);
}

// ===== TABS =====
function switchTab(t){
  currentTab=t;
  const tabs = ['flash', 'overview', 'quiz', 'manage'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', tabs[i]===t);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  
  document.getElementById('mainControls').style.display = (t==='manage') ? 'none' : 'flex';
  
  if(t==='overview') renderOverview();
  if(t==='flash') renderFlashcard();
}

// ===== FLASHCARD =====
function renderFlashcard(){
  if(filtered.length===0){
    document.getElementById('fcCounter').textContent='0 / 0';
    document.getElementById('fcProgress').style.width='0%';
    document.getElementById('fcEng').textContent='沒有符合的單字';
    document.getElementById('fcZh').textContent='';
    document.getElementById('fcCatF').textContent='';
    document.getElementById('fcCatB').textContent='';
    document.getElementById('prevBtn').disabled=true;
    document.getElementById('nextBtn').disabled=true;
    return;
  }
  const item=filtered[fcIndex];
  document.getElementById('fcCounter').textContent=`${fcIndex+1} / ${filtered.length}`;
  document.getElementById('fcProgress').style.width=((fcIndex+1)/filtered.length*100)+'%';
  document.getElementById('fcEng').textContent=item.en;
  document.getElementById('fcZh').textContent=item.zh;
  document.getElementById('fcCatF').textContent=item.cat;
  document.getElementById('fcCatB').textContent=item.cat;
  document.getElementById('fcInner').classList.toggle('flipped',isFlipped);
  document.getElementById('prevBtn').disabled=fcIndex===0;
  document.getElementById('nextBtn').disabled=fcIndex>=filtered.length-1;
  updateFavBtns(item);
}
function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('fcInner').classList.toggle('flipped',isFlipped);
}
function prevCard(){if(fcIndex>0){fcIndex--;isFlipped=false;renderFlashcard();}}
function nextCard(){if(fcIndex<filtered.length-1){fcIndex++;isFlipped=false;renderFlashcard();}}
function toggleFav(){
  if(filtered.length===0) return;
  const item=filtered[fcIndex];
  if(favorites.has(item.en)) favorites.delete(item.en); else favorites.add(item.en);
  saveData();
  updateFavBtns(item);
  if(favOnly){applyFilter();if(fcIndex>=filtered.length)fcIndex=Math.max(0,filtered.length-1);renderFlashcard();}
}
function updateFavBtns(item){
  const isFav=favorites.has(item.en);
  ['favBtnF','favBtnB'].forEach(id=>{
    const b=document.getElementById(id);
    b.textContent=isFav?'★':'☆';
    b.classList.toggle('fav',isFav);
  });
}
function speakWord(){
  if(filtered.length===0) return;
  const item=filtered[fcIndex];
  const u=new SpeechSynthesisUtterance(item.en);
  u.lang='en-US'; u.rate=0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== OVERVIEW =====
function renderOverview(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase().trim();
  let list=filtered;
  if(q) list=list.filter(d=>d.en.toLowerCase().includes(q)||d.zh.includes(q));
  document.getElementById('ovStats').textContent=`共 ${list.length} 個單字`;
  const groups={};
  list.forEach(d=>{if(!groups[d.cat])groups[d.cat]=[];groups[d.cat].push(d);});
  let html='';
  for(const cat in groups){
    html+=`<div class="grp-title">${cat}（${groups[cat].length}）</div>`;
    groups[cat].forEach(d=>{
      const isFav=favorites.has(d.en);
      const safeEn = d.en.replace(/'/g,"\\'");
      html+=`<div class="vocab-row fade-in" onclick="speakThis('${safeEn}')">
        <span class="eng">${highlight(d.en,q)}</span>
        <span class="chi">${highlight(d.zh,q)}</span>
        <span class="row-acts">
          <button onclick="event.stopPropagation();speakThis('${safeEn}')" title="發音">🔊</button>
          <button onclick="event.stopPropagation();toggleFavOv('${safeEn}')" class="${isFav?'fav':''}" title="最愛">${isFav?'★':'☆'}</button>
          <button onclick="event.stopPropagation();deleteWord('${safeEn}')" class="del" title="刪除單字">🗑️</button>
        </span>
      </div>`;
    });
  }
  if(!list.length) html='<div class="empty"><div class="em">🔍</div>找不到符合的單字</div>';
  document.getElementById('ovList').innerHTML=html;
}
function highlight(text,q){
  if(!q) return text;
  const i=text.toLowerCase().indexOf(q);
  if(i===-1) return text;
  return text.slice(0,i)+'<mark style="background:#fff3cd;border-radius:3px;padding:0 2px;">'+text.slice(i,i+q.length)+'</mark>'+text.slice(i+q.length);
}
function speakThis(en){
  const u=new SpeechSynthesisUtterance(en);u.lang='en-US';u.rate=0.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function toggleFavOv(en){
  if(favorites.has(en)) favorites.delete(en); else favorites.add(en);
  saveData();
  renderOverview();
  if(filtered.length>0 && filtered[fcIndex]) updateFavBtns(filtered[fcIndex]);
}

// ===== QUIZ =====
function setQuizMode(mode,btn){
  quizMode=mode;
  document.querySelectorAll('.qz-mode').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function startQuiz(){
  let pool=filtered.length?[...filtered]:[...DATA];
  // shuffle
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  quizTotal=Math.min(10,pool.length);
  quizQuestions=pool.slice(0,quizTotal);
  quizIdx=0;quizScore=0;quizAnswered=false;
  document.getElementById('qzStart').style.display='none';
  renderQuizQuestion();
}
function renderQuizQuestion(){
  if(quizIdx>=quizTotal){showQuizResult();return;}
  const item=quizQuestions[quizIdx];
  const isEn2Zh=quizMode==='en2zh';
  const qText=isEn2Zh?item.en:item.zh;
  const correctAns=isEn2Zh?item.zh:item.en;
  const label=isEn2Zh?'請選出正確的中文意思':'請選出正確的英文單字';

  // generate options
  let opts=[correctAns];
  let allAns=DATA.map(d=>isEn2Zh?d.zh:d.en).filter(a=>a!==correctAns);
  for(let i=allAns.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[allAns[i],allAns[j]]=[allAns[j],allAns[i]];}
  opts.push(...allAns.slice(0,3));
  // shuffle opts
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}

  document.getElementById('qzInfo').innerHTML=`第 ${quizIdx+1}/${quizTotal} 題 · 得分：<b>${quizScore}</b>`;
  document.getElementById('qzProgress').style.width=((quizIdx)/quizTotal*100)+'%';

  let html=`<div class="qz-card fade-in">
    <div class="qz-label">${label}</div>
    <div class="qz-q">${qText}</div>
    <div class="qz-opts">`;
  opts.forEach((o,i)=>{
    html+=`<button class="qz-opt" onclick="answerQuiz(this,'${encodeURIComponent(o)}','${encodeURIComponent(correctAns)}')">${o}</button>`;
  });
  html+=`</div></div>`;
  document.getElementById('qzContent').innerHTML=html;
  quizAnswered=false;
}
function answerQuiz(btn,chosen,correct){
  if(quizAnswered) return;
  quizAnswered=true;
  chosen=decodeURIComponent(chosen);
  correct=decodeURIComponent(correct);
  const isCorrect=chosen===correct;
  if(isCorrect) quizScore++;

  const btns=document.querySelectorAll('.qz-opt');
  btns.forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add('correct');
    if(b===btn && !isCorrect) b.classList.add('wrong');
  });

  document.getElementById('qzInfo').innerHTML=`第 ${quizIdx+1}/${quizTotal} 題 · 得分：<b>${quizScore}</b>`;

  if(!isCorrect){btn.classList.add('shake');}

  setTimeout(()=>{
    quizIdx++;
    renderQuizQuestion();
  },1200);
}
function showQuizResult(){
  const pct=Math.round(quizScore/quizTotal*100);
  let emoji='🎉';
  if(pct<60) emoji='💪';
  else if(pct<80) emoji='👍';
  document.getElementById('qzProgress').style.width='100%';
  document.getElementById('qzInfo').innerHTML=`測驗完成！`;
  document.getElementById('qzContent').innerHTML=`
    <div class="qz-card fade-in">
      <div class="qz-result">
        <div style="font-size:3rem;margin-bottom:12px;">${emoji}</div>
        <div class="big">${quizScore} / ${quizTotal}</div>
        <div class="lbl">正確率 ${pct}%</div>
        <button class="qz-next" onclick="restartQuiz()" style="margin-top:24px;">再測一次</button>
      </div>
    </div>`;
}
function restartQuiz(){
  document.getElementById('qzContent').innerHTML='';
  document.getElementById('qzStart').style.display='';
  document.getElementById('qzInfo').innerHTML='得分：<b>0 / 0</b>';
  document.getElementById('qzProgress').style.width='0%';
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(currentTab==='flash'){
    if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
    if(e.key==='ArrowRight'){e.preventDefault();nextCard();}
    if(e.key===' '){e.preventDefault();flipCard();}
    if(e.key==='s'||e.key==='S'){e.preventDefault();speakWord();}
  }
});

// ===== GO =====
init();
</script>
</body>
</html>
